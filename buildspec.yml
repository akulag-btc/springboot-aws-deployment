version: 0.2
phases:
  pre_build:
    commands:
      - echo logging in to Amazon ECR.....
      - aws --version
      # Get the login command from ECR and execute it directly
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 509820673777.dkr.ecr.us-east-1.amazonaws.com
      - REPOSITORY_URI=509820673777.dkr.ecr.us-east-1.amazonaws.com/spring-demo-ecr
      - IMAGE_TAG=${echo $CODEBUILD_BUILD_ID | awk -F ":" '{print $2}'}
  build:
    commands:
      - echo Build started on `date`
      - echo building the jar file
      - mvn clean install
      - echo building the Docker image
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo pushing to repo
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo writing image definition file....
      - DOCKER_CONTAINER_NAME="spring-demo-ecr-container"
      - printf '[{"name":"%s","imageUri":"%s"}]' $DOCKER_CONTAINER_NAME $REPOSITORY_URI:$IMAGE_TAG > imageDefinition.json
      - echo $DOCKER_CONTAINER_NAME
      - echo printing imagedeinitions.json
      - cat imageDefinition.json
artifacts:
  files:
    - imageDefinition.json
    - target/springboot-aws-deploy-service.jar